name: FruityMerge
options:
  bundleIdPrefix: com.abhisheknagaraja
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: "NO"
    ENABLE_BITCODE: "NO"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.0"

targets:
  FruityMerge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FruityMerge
        excludes:
          - "**/*.md"
    resources:
      - path: FruityMerge/Resources
        excludes:
          - "**/readme-*.png"
    info:
      path: FruityMerge/Supporting/Info.plist
      properties:
        CFBundleName: Fruity Merge
        CFBundleDisplayName: Fruity Merge
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abhisheknagaraja.fruitymerge
        PRODUCT_NAME: FruityMerge
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: FruityMerge/Supporting/Info.plist
